<!DOCTYPE html>
<html lang="es">
<head>
<link rel="website icon" type="png" href="favicon-32x32.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña | Clarity</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top right, rgba(91,192,255,0.28), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #eef8ff 100%);
    color:#1f2937;
    min-height:100vh;
}

.navbar{
    height:50px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 7%;
    background:#082B63;
    border-bottom:2px solid #5bc0ff;
}

.brand{
    text-decoration:none;
}

.brand-name{
    font-size:20px;
    font-weight:900;
    color:#ffffff;
    letter-spacing:1px;
}

.diamond{
    color:white;
    font-size:26px;
}

.page{
    min-height:calc(100vh - 50px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

.auth-card{
    width:100%;
    max-width:430px;
    background:white;
    border:1px solid #d8eefc;
    border-radius:22px;
    padding:36px;
    box-shadow:0 20px 45px rgba(8,43,99,0.12);
}

.auth-card h1{
    color:#082B63;
    font-size:30px;
    margin-bottom:8px;
    text-align:center;
}

.auth-card p{
    color:#4b5563;
    text-align:center;
    margin-bottom:28px;
    line-height:1.5;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-size:14px;
    font-weight:700;
    color:#374151;
    margin-bottom:7px;
}

.form-group input{
    width:100%;
    padding:13px 14px;
    border:1px solid #cfe8f8;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:#1565c0;
}

.auth-button{
    width:100%;
    padding:13px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
}

.auth-button:hover{
    background:#0f4f9e;
}

#messageBox{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    font-weight:700;
}
</style>
</head>

<body>

<header class="navbar">
    <a href="index.html" class="brand">
        <span class="brand-name">
            CLARITY <span class="diamond">♦</span>
        </span>
    </a>
</header>

<main class="page">

    <section class="auth-card">

        <h1>Nueva contraseña</h1>

        <p>
            Introduce tu nueva contraseña.
        </p>

        <div class="form-group">
            <label>Nueva contraseña</label>

            <input
                type="password"
                id="passwordInput"
                placeholder="Nueva contraseña"
            >
        </div>

        <div class="form-group">
            <label>Confirmar contraseña</label>

            <input
                type="password"
                id="confirmPasswordInput"
                placeholder="Repite la contraseña"
            >
        </div>

        <button id="saveBtn" class="auth-button">
            Guardar nueva contraseña
        </button>

        <p id="messageBox"></p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://sxangxdumgoarftpidex.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4YW5neGR1bWdvYXJmdHBpZGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTAyNjQsImV4cCI6MjA5NTc4NjI2NH0.YIrylgNL3n8vzROjxLLyFTT_k1-TowcLQ0ALjNZzLYc";

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const saveBtn =
document.getElementById("saveBtn");

const passwordInput =
document.getElementById("passwordInput");

const confirmPasswordInput =
document.getElementById("confirmPasswordInput");

const messageBox =
document.getElementById("messageBox");

saveBtn.addEventListener("click", async function(){

    const password =
        passwordInput.value;

    const confirmPassword =
        confirmPasswordInput.value;

    if(password.length < 6){

        messageBox.style.color = "#dc2626";

        messageBox.textContent =
            "La contraseña debe tener al menos 6 caracteres.";

        return;
    }

    if(password !== confirmPassword){

        messageBox.style.color = "#dc2626";

        messageBox.textContent =
            "Las contraseñas no coinciden.";

        return;
    }

    saveBtn.disabled = true;

    saveBtn.textContent =
        "Guardando...";

    const { error } =
        await supabaseClient.auth.updateUser({
            password: password
        });

    if(error){

        messageBox.style.color = "#dc2626";

        messageBox.textContent =
            error.message;

        saveBtn.disabled = false;

        saveBtn.textContent =
            "Guardar nueva contraseña";

        return;
    }

    messageBox.style.color = "#16a34a";

    messageBox.textContent =
        "Contraseña actualizada correctamente.";

    setTimeout(() => {

        window.location.href =
            "login.html";

    }, 2000);

});

</script>

</body>
</html>
