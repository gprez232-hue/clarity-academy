<title>Acceso denegado | Clarity</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg,#ffffff 0%,#eef8ff 100%);
    padding:20px;
}

.card{
    max-width:520px;
    background:white;
    border:1px solid #d8eefc;
    border-radius:22px;
    padding:42px;
    text-align:center;
    box-shadow:0 20px 45px rgba(8,43,99,0.12);
}

.icon{
    width:64px;
    height:64px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#fff3f3;
    color:#dc2626;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:900;
}

h1{
    color:#082B63;
    font-size:30px;
    margin-bottom:14px;
}

p{
    color:#4b5563;
    line-height:1.6;
    margin-bottom:26px;
}

a{
    display:inline-block;
    background:#1565c0;
    color:white;
    text-decoration:none;
    padding:13px 26px;
    border-radius:10px;
    font-weight:800;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">!</div>

    <h1>Acceso denegado</h1>

    <p>
        No tienes permiso para acceder a esta página.

</div>
