<!DOCTYPE html>

<html lang="es">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta Verificada | Clarity Spin & Go Academy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top right, rgba(91,192,255,0.28), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #eef8ff 100%);

    padding:20px;
}

.card{
    width:100%;
    max-width:550px;

    background:white;

    border:1px solid #d8eefc;
    border-radius:24px;

    padding:50px 40px;

    text-align:center;

    box-shadow:0 20px 45px rgba(8,43,99,0.12);
}

.check{
    width:80px;
    height:80px;

    margin:0 auto 25px;

    border-radius:50%;

    background:#e7f7ee;
    color:#16a34a;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;
    font-weight:bold;
}

h1{
    color:#082B63;
    font-size:34px;
    margin-bottom:16px;
}

p{
    color:#4b5563;
    line-height:1.7;
    margin-bottom:30px;
    font-size:16px;
}

.login-btn{
    display:inline-block;

    background:#1565c0;
    color:white;

    text-decoration:none;

    padding:14px 30px;

    border-radius:10px;

    font-weight:800;
    font-size:15px;

    transition:0.2s;
}

.login-btn:hover{
    background:#0f4f9e;
    transform:translateY(-2px);
}

.brand{
    margin-top:25px;
    font-size:13px;
    color:#6b7280;
}

</style>

</head>

<body>

<div class="card">

```
<div class="check">✓</div>

<h1>¡Cuenta verificada!</h1>

<p>
    Bienvenido a <strong>Clarity Spin & Go Academy</strong>.<br><br>

    Tu correo electrónico ha sido verificado correctamente y tu cuenta ya está activa.

    Ahora puedes iniciar sesión y acceder al contenido de la academia.
</p>

<a href="login.html" class="login-btn">
    Iniciar sesión
</a>

<div class="brand">
    Clarity Spin & Go Academy
</div>
```

</div>

</body>
</html>
