<!DOCTYPE html>
<html lang="es">
<head>
<link rel="website icon" type="png" href="favicon-32x32.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña | Clarity</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top right, rgba(91,192,255,0.28), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #eef8ff 100%);
    color:#1f2937;
    min-height:100vh;
}

.navbar{
    height:50px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 7%;
    background:#082B63;
    border-bottom:2px solid #5bc0ff;
}

.brand{text-decoration:none}

.brand-name{
    font-size:20px;
    font-weight:900;
    color:white;
    letter-spacing:1px;
}

.diamond{
    color:white;
    font-size:26px;
}

.nav-link{
    color:#5bc0ff;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
}

.page{
    min-height:calc(100vh - 50px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

.auth-card{
    width:100%;
    max-width:430px;
    background:white;
    border:1px solid #d8eefc;
    border-radius:22px;
    padding:36px;
    box-shadow:0 20px 45px rgba(8,43,99,0.12);
}

.auth-card h1{
    color:#082B63;
    font-size:30px;
    margin-bottom:8px;
    text-align:center;
}

.auth-card p{
    color:#4b5563;
    text-align:center;
    margin-bottom:28px;
    line-height:1.5;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-size:14px;
    font-weight:700;
    color:#374151;
    margin-bottom:7px;
}

.form-group input{
    width:100%;
    padding:13px 14px;
    border:1px solid #cfe8f8;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:#1565c0;
}

.auth-button{
    width:100%;
    padding:13px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    margin-top:8px;
}

.auth-button:hover{
    background:#0f4f9e;
}

.auth-footer{
    margin-top:22px;
    text-align:center;
    font-size:14px;
    color:#4b5563;
}

.auth-footer a{
    color:#1565c0;
    font-weight:800;
    text-decoration:none;
}

#messageBox{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    font-weight:700;
}
</style>
</head>

<body>

<header class="navbar">
    <a href="index.html" class="brand">
        <span class="brand-name">
            CLARITY <span class="diamond">♦</span>
        </span>
    </a>

    <a href="login.html" class="nav-link">Volver al login</a>
</header>

<main class="page">
    <section class="auth-card">

        <h1>Recuperar contraseña</h1>
        <p>
            Escribe tu email y te enviaremos un enlace para crear una nueva contraseña.
        </p>

        <div class="form-group">
            <label>Email</label>
            <input
                id="emailInput"
                type="email"
                placeholder="tuemail@email.com"
            >
        </div>

        <button id="resetBtn" class="auth-button">
            Enviar enlace de recuperación
        </button>

        <p id="messageBox"></p>

        <div class="auth-footer">
            ¿Recordaste tu contraseña?
            <a href="login.html">Iniciar sesión</a>
        </div>

    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://sxangxdumgoarftpidex.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4YW5neGR1bWdvYXJmdHBpZGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTAyNjQsImV4cCI6MjA5NTc4NjI2NH0.YIrylgNL3n8vzROjxLLyFTT_k1-TowcLQ0ALjNZzLYc";

const recoverySupabase = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const emailInput = document.getElementById("emailInput");
const resetBtn = document.getElementById("resetBtn");
const messageBox = document.getElementById("messageBox");

resetBtn.addEventListener("click", async function(){

    const email = emailInput.value.trim().toLowerCase();

    if(!email){
        messageBox.style.color = "#dc2626";
        messageBox.textContent = "Escribe tu email.";
        return;
    }

    resetBtn.disabled = true;
    resetBtn.textContent = "Enviando...";

    const { error } = await recoverySupabase.auth.resetPasswordForEmail(
        email,
        {
            redirectTo: "https://www.clarityspinandgo.com/nueva_password.html"
        }
    );

    if(error){
        messageBox.style.color = "#dc2626";
        messageBox.textContent = "Error: " + error.message;
    }else{
        messageBox.style.color = "#16a34a";
        messageBox.textContent = "Revisa tu correo. Te enviamos un enlace para recuperar tu contraseña.";
    }

    resetBtn.disabled = false;
    resetBtn.textContent = "Enviar enlace de recuperación";
});
</script>

</body>
</html>
