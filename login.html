<!DOCTYPE html>
<html lang="es">
<head>
   <link rel="website icon"
      type="png"
      href="favicon-32x32.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Clarity Spin & Go Academy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top right, rgba(91,192,255,0.28), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #eef8ff 100%);
    color:#1f2937;
    min-height:100vh;
}

.navbar{
    height:50px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 7%;
    background:#082B63;
    border-bottom:2px solid #5bc0ff;
}

.brand{
    text-decoration:none;
}

.brand-name{
    font-size:20px;
    font-weight:900;
    color:#ffffff;
    letter-spacing:1px;
}

.nav-link{
    color:#5bc0ff;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
}

.page{
    min-height:calc(100vh - 50px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

.auth-card{
    width:100%;
    max-width:430px;
    background:white;
    border:1px solid #d8eefc;
    border-radius:22px;
    padding:36px;
    box-shadow:0 20px 45px rgba(8,43,99,0.12);
}

.auth-card h1{
    color:#082B63;
    font-size:32px;
    margin-bottom:8px;
    text-align:center;
}

.auth-card p{
    color:#4b5563;
    text-align:center;
    margin-bottom:28px;
    line-height:1.5;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-size:14px;
    font-weight:700;
    color:#374151;
    margin-bottom:7px;
}

.form-group input{
    width:100%;
    padding:13px 14px;
    border:1px solid #cfe8f8;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:#1565c0;
}

.auth-button{
    width:100%;
    padding:13px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    margin-top:8px;
}

.auth-button:hover{
    background:#0f4f9e;
}

.auth-footer{
    margin-top:22px;
    text-align:center;
    font-size:14px;
    color:#4b5563;
}

.auth-footer a{
    color:#1565c0;
    font-weight:800;
    text-decoration:none;
}

#messageBox{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    font-weight:700;
}

.loading-overlay{
    position:fixed;
    inset:0;
    background:rgba(8,43,99,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loading-card{
    background:white;
    padding:32px 42px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 45px rgba(8,43,99,0.20);
}

.spinner{
    width:42px;
    height:42px;
    border:4px solid #d8eefc;
    border-top:4px solid #1565c0;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 16px;
}

.loading-card p{
    color:#082B63;
    font-size:15px;
    font-weight:800;
    margin:0;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.diamond{
    color:white;
    font-size:26px;
}
</style>
</head>

<body>

<header class="navbar">
    <a href="index.html" class="brand">
        <span class="brand-name">
            CLARITY <span class="diamond">♦</span>
        </span>
    </a>

    <a href="register.html" class="nav-link">Register</a>
</header>

<main class="page">
    <div id="loadingModal" class="loading-overlay">
    <div class="loading-card">
        <div class="spinner"></div>
        <p>Iniciando sesión...</p>
    </div>
</div>
    <section class="auth-card">

        <h1>Iniciar sesión</h1>
        <p>Accede a tu cuenta de Clarity Academy.</p>

        <form id="loginForm">

            <div class="form-group">
                <label>Email</label>
                <input
                    id="emailInput"
                    type="email"
                    placeholder="tuemail@email.com"
                >
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input
                    id="passwordInput"
                    type="password"
                    placeholder="Tu contraseña"
                >
            </div>

            <button type="submit" class="auth-button">
                Entrar
            </button>
            <div style="text-align:center; margin-top:15px;">
    <a
        href="recuperar_password.html"
        style="
            color:#1565c0;
            font-size:14px;
            font-weight:700;
            text-decoration:none;
        "
    >
        ¿Olvidaste tu contraseña?
    </a>
</div>

        </form>

        <p id="messageBox"></p>

        <div class="auth-footer">
            ¿No tienes cuenta?
            <a href="register.html">Regístrate</a>
        </div>

    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>

</body>
</html>
