<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablas Preflop | Clarity Spin & Go Academy</title>

<link rel="icon" href="/favicon.ico" sizes="any">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#eef8ff;
    color:#1f2937;
}

.page{
    min-height:100vh;
    padding:0;
    background:#eef8ff;
}

.preflop-app{
    display:grid;
    grid-template-columns:320px 1fr;
    min-height:100vh;
}

.preflop-sidebar{
    background:#082B63;
    padding:6px;
    color:white;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.app-logo{
    text-align:center;
    color:white;
    font-size:20px;
    font-weight:900;
    margin-bottom:10px;
    padding-top:8px;
    letter-spacing:1px;
}

.back-link{
    display:block;
    text-align:center;
    color:#5bc0ff;
    text-decoration:none;
    font-size:12px;
    font-weight:800;
    margin-bottom:10px;
}

.mode-container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    margin-bottom:10px;
}

.mode-btn{
    padding:11px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#123b78;
    color:white;
    font-weight:900;
}

.mode-btn.active{
    background:#38bdf8;
    color:#082B63;
}

.columns{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
    align-items:start;
}

.column{
    background:transparent;
    border:none;
    padding:0;
}

.col-title{
    text-align:center;
    margin-bottom:8px;
    font-weight:900;
    font-size:16px;
}

.btn{color:#ff4040}
.sb{color:#facc15}
.bb{color:#22c55e}

.spot-btn{
    width:100%;
    min-height:36px;
    padding:6px 5px;
    margin-bottom:7px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#123b78;
    color:#eaf6ff;
    font-size:12px;
    font-weight:900;
    text-align:center;
    line-height:1.15;
}

.spot-btn:hover{
    background:#38bdf8;
    color:#082B63;
}

.legend{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:7px;
}

.preflop-sidebar.hu-mode .legend{
    margin-top:6px;
}

.preflop-sidebar.hu-mode .columns{
    margin-bottom:2px;
}

.legend-item{
    padding:8px;
    border-radius:6px;
    font-size:12px;
    text-align:center;
    font-weight:900;
    color:black;
}

.extra-tables{
    margin-top:auto;
    padding-top:20px;
}

.extra-title{
    text-align:center;
    color:white;
    font-size:13px;
    font-weight:900;
    margin-bottom:10px;
    letter-spacing:1px;
}

.extra-btn{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1565c0;
    color:white;
    font-size:13px;
    font-weight:900;
}

.extra-btn:hover{
    background:#38bdf8;
    color:#082B63;
}

.preflop-main{
    background:#f4f9ff;
    padding:18px;
    overflow:auto;
}

#title{
    color:#082B63;
    font-size:22px;
    margin-bottom:10px;
}

#stacks{
    margin-bottom:12px;
}

.stack-btn{
    padding:9px 13px;
    margin:4px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:#1565c0;
    color:white;
    font-size:13px;
    font-weight:900;
}

.stack-btn:hover{
    background:#0f4f9e;
}

.table{
    margin-top:12px;
    background:#dceeff;
    padding:18px;
    border-radius:10px;
    text-align:center;
    overflow-x:auto;
}

.table h3{
    color:#082B63;
    font-size:18px;
    margin-bottom:10px;
}

.table img{
    width:820px;
    max-width:100%;
    border-radius:8px;
    background:white;
}

.empty-state{
    color:#4b5563;
    font-size:15px;
    background:white;
    border:1px solid #d8eefc;
    border-radius:10px;
    padding:22px;
}

.loading-overlay{
    position:fixed;
    inset:0;
    background:rgba(8,43,99,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loading-card{
    background:white;
    padding:32px 42px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 45px rgba(8,43,99,0.20);
}

.spinner{
    width:42px;
    height:42px;
    border:4px solid #d8eefc;
    border-top:4px solid #1565c0;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 16px;
}

.loading-card p{
    color:#082B63;
    font-size:15px;
    font-weight:800;
    margin:0;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

@media(max-width:1000px){
    .preflop-app{
        grid-template-columns:1fr;
    }

    .columns{
        grid-template-columns:repeat(2, 1fr);
    }
}
</style>
</head>

<body>

    <div class="preflop-app">

            <h1 class="app-logo">CLARITY PREFLOP</h1>
            <a href="index.html" class="back-link">← Volver a la academia</a>

            <div class="mode-container">
                <button class="mode-btn active" onclick="setMode('3WAY', this)">3WAY</button>
                <button class="mode-btn" onclick="setMode('HU', this)">HU</button>
            </div>

            <div id="columns" class="columns"></div>

            <div id="legend" class="legend"></div>

            <div class="extra-tables">
                <h3 class="extra-title">OTRAS TABLAS</h3>

                <button class="extra-btn" onclick="showExtraTable('Defensa')">

                </button>

                <button class="extra-btn" onclick="showExtraTable('Cbet Flop')">

            <h2 id="title">Selecciona un spot</h2>

            <div id="stacks"></div>

            <div id="table" class="table">
                <div class="empty-state">
                    Selecciona un spot desde el panel izquierdo para cargar la tabla preflop.
                </div>
            </div>

        </section>

    </div>
</main>

<div id="loadingModal" class="loading-overlay">
    <div class="loading-card">
        <div class="spinner"></div>
        <p>Verificando acceso...</p>

</div>

let currentMode = "3WAY";

function loadLegend(spot){
  const legendDiv = document.getElementById("legend");
  legendDiv.innerHTML = "";

  const legendData = legends[spot];
  if(!legendData) return;

  legendData.forEach(item => {
    const div = document.createElement("div");
    div.className = "legend-item";
    div.style.background = item.color;
    div.style.color = "black";
    div.innerText = item.text;
    legendDiv.appendChild(div);
  });
}

function setMode(mode, btn){
  currentMode = mode;

  const sidebar = document.querySelector(".preflop-sidebar");

  if(sidebar){
    if(mode === "HU"){
      sidebar.classList.add("hu-mode");
    }else{
      sidebar.classList.remove("hu-mode");
    }
  }

  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  loadColumns();

  document.getElementById("stacks").innerHTML = "";
  document.getElementById("legend").innerHTML = "";
  document.getElementById("table").innerHTML = `
    <div class="empty-state">
      Selecciona un spot desde el panel izquierdo para cargar la tabla preflop.
    </div>
  `;
  document.getElementById("title").innerText = "Selecciona un spot";
}

function loadColumns(){
  let container = document.getElementById("columns");
  container.innerHTML = "";

  if(currentMode === "3WAY"){
    container.innerHTML += createColumn("BTN", ["BTN"], "btn");
    container.innerHTML += createColumn("SB", Object.keys(data["3WAY"].SB), "sb");
    container.innerHTML += createColumn("BB vs BTN", Object.keys(data["3WAY"].BB_BTN), "bb");
    container.innerHTML += createColumn("BB vs SB", Object.keys(data["3WAY"].BB_SB), "bb");
  } else {
    container.innerHTML += createColumn("SB", Object.keys(data["HU"].SB), "sb");
    container.innerHTML += createColumn("BB", Object.keys(data["HU"].BB), "bb");
  }
}

function createColumn(title, items, color){
  let html = `<div class="column">
    <div class="col-title ${color}">${title}</div>`;

  items.forEach(item => {
    html += `<button class="spot-btn" onclick="loadSpot('${item}')">${item}</button>`;
  });

  html += `</div>`;
  return html;
}

function loadSpot(spot){
  document.getElementById("title").innerText = spot;
  loadLegend(spot);

  let stacksDiv = document.getElementById("stacks");
  stacksDiv.innerHTML = "";

  let stacks = findStacks(spot);

  stacks.forEach(stack => {
    let btn = document.createElement("button");
    btn.className = "stack-btn";
    btn.innerText = stack;
    btn.onclick = () => showImage(spot, stack);
    stacksDiv.appendChild(btn);
  });

  if(stacks.length > 0){
    showImage(spot, stacks[0]);
  }
}

function formatName(name){
  return name.replaceAll(" ", "_");
}

function showImage(spot, stack){
  let imgPath = `images/${formatName(spot)}/${stack}.png`;

  document.getElementById("table").innerHTML = `
    <h3>${spot} | ${stack}</h3>
    <img src="${imgPath}" onerror="this.style.display='none'; this.parentElement.innerHTML += '<div class=&quot;empty-state&quot;>Imagen no encontrada. Revisa la carpeta: ${imgPath}</div>';">
  `;
}

function showExtraTable(type){

    let imgPath = "";

    if(type === "Defensa"){
        imgPath = "images/Defensa/general.png";
    }

    if(type === "Cbet Flop"){
        imgPath = "images/Cbet_Flop/general.png";
    }

    if(type === "Cbet TYR"){
        imgPath = "images/Cbet_TYR/general.png";
    }

    document.getElementById("title").innerText = type;
    document.getElementById("stacks").innerHTML = "";
    document.getElementById("legend").innerHTML = "";

    document.getElementById("table").innerHTML = `
        <h3>${type}</h3>
        <img src="${imgPath}" onerror="this.style.display='none'; this.parentElement.innerHTML += '<div class=&quot;empty-state&quot;>Imagen no encontrada. Revisa la carpeta: ${imgPath}</div>';">
    `;
}

function findStacks(spot){
  let modeData = data[currentMode];
  if(modeData[spot]) return modeData[spot];

  for(let key in modeData){
    if(typeof modeData[key] === "object"){
      if(modeData[key][spot]) return modeData[key][spot];
    }
  }

  return [];
}

loadColumns();
